<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Complete the tasks to earn money</title>

<style>

body{
font-family: Arial;
background:#f7e2a6;
text-align:center;
margin:0;
}

.header{
font-size:40px;
padding:20px;
font-weight:bold;
}

.money{
font-size:30px;
margin:10px;
}

.task{
background:white;
border-radius:15px;
margin:20px;
padding:20px;
box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

.progress{
height:15px;
background:#ddd;
border-radius:10px;
margin:10px 0;
}

.bar{
height:15px;
background:gold;
width:0%;
border-radius:10px;
}

.btn{
background:#2f80ed;
color:white;
border:none;
padding:10px 20px;
border-radius:10px;
font-size:16px;
}

.withdraw{
background:white;
margin:20px;
padding:20px;
border-radius:15px;
}

.withdraw button{
margin:10px;
padding:15px;
font-size:18px;
border-radius:10px;
border:none;
}

.zalo{background:#2d9cff;color:white;}
.momo{background:#ff3ca6;color:white;}
.mb{background:#2979ff;color:white;}

</style>
</head>

<body>

<div class="header">Tiền: <span id="money">0</span>đ</div>

<div id="tasks"></div>

<div class="withdraw">

<h2>Rút thưởng</h2>

<input placeholder="Số tài khoản"><br><br>
<input placeholder="Tên tài khoản"><br><br>

<button class="zalo">ZaloPay</button>
<button class="momo">MoMo</button>
<button class="mb">MB Bank</button>

<br><br>

<button onclick="withdraw()">RÚT TIỀN</button>

</div>

<script>

let money = 0

function createTask(id){

let progress = 0

let task = document.createElement("div")
task.className="task"

task.innerHTML=`
<h3>Nhiệm vụ ${id}</h3>

<div class="progress">
<div class="bar" id="bar${id}"></div>
</div>

<button class="btn">XEM QUẢNG CÁO</button>
`

task.querySelector("button").onclick=function(){

progress++

let percent = progress*10

document.getElementById("bar"+id).style.width = percent+"%"

money+=200

document.getElementById("money").innerText = money

if(progress>=10){

alert("Hoàn thành nhiệm vụ!")

}

}

document.getElementById("tasks").appendChild(task)

}

for(let i=1;i<=5;i++){
createTask(i)
}

function withdraw(){

if(money<2000){
alert("Cần 2000đ để rút")
return
}

alert("Yêu cầu rút tiền đã gửi!")

}

</script>

</body>
</html>
